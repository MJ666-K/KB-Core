services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_core}
    volumes:
      - kc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-knowledge_core}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kc-redis
    command: redis-server --appendonly yes
    volumes:
      - kc_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: kc-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      # 小内存 VPS 建议保留以下限制（2GB 机器可再调低）
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-256m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-256m}
    volumes:
      - kc_neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j_dev_password}", "RETURN 1"]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  app:
    image: kb-core:v1.0.0
    container_name: kc-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_core}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_dev_password}
      STATIC_ROOT: /status/dist
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kc_pgdata:
  kc_redisdata:
  kc_neo4jdata:
